<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grand Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fas fa-hotel"></i> Grand Hotel
            </a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/rooms">Rooms</a></li>
                <li><a href="/booking">Book Now</a></li>
                <li><a href="/login" class="active">Login</a></li>
                <li><a href="/signup">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-user-circle"></i>
                <h2>Welcome Back</h2>
                <p>Login to your account</p>
            </div>
            
            <div id="alertMessage" class="alert" style="display: none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Sign Up</a></p>
            </div>

            <div class="demo-credentials">
                <p><strong>Demo Credentials:</strong></p>
                <p>Admin: admin@hotel.com / admin123</p>
                <p>User: john@example.com / user123</p>
            </div>
        </div>
    </div>

    <!-- <script src="/js/auth.js"></script> -->
     <!-- REMOVE THIS -->
<!-- <script src="/js/auth.js"></script> -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertMessage = document.getElementById('alertMessage');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    alertMessage.className = 'alert alert-success';
                    alertMessage.textContent = 'Login successful! Redirecting...';
                    alertMessage.style.display = 'block';

                    setTimeout(() => {
                        if (data.data.user.role === 'admin') {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                } else {
                    alertMessage.className = 'alert alert-error';
                    alertMessage.textContent = data.message || 'Login failed';
                    alertMessage.style.display = 'block';
                }
            } catch (error) {
                alertMessage.className = 'alert alert-error';
                alertMessage.textContent = 'An error occurred. Please try again.';
                alertMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
